name: oss-signal
description: Audit OSS maintainer readiness, guard known-good baselines, and produce CI evidence, SARIF, inventory/trend reports, workflow trials, and adoption packs.
author: SalmonPlays
branding:
  icon: shield
  color: blue
inputs:
  path:
    description: Local repository path, GitHub URL, or owner/repo shorthand to audit.
    required: false
    default: "."
  inventory:
    description: Newline-delimited file of local paths, GitHub URLs, or owner/repo shorthands to audit as an inventory.
    required: false
  trend:
    description: Newline-delimited file of retained oss-signal JSON report paths to summarize as a score trend.
    required: false
  format:
    description: Output format, either markdown, summary, json, env, sarif, issue, plan, workflow, or adoption. Inventory supports markdown, json, or env; trend supports markdown or json.
    required: false
    default: markdown
  output:
    description: Report file path.
    required: false
    default: oss-signal-report.md
  summary:
    description: Write a concise report to the GitHub Actions step summary.
    required: false
    default: "true"
  fail-under:
    description: Fail the action when the score, or any inventory target score, is below this 0-100 number.
    required: false
  max-files:
    description: Positive integer maximum files to inspect.
    required: false
    default: "20000"
  ref:
    description: Git ref for GitHub URL audits.
    required: false
  config:
    description: Path to an oss-signal JSON config file. Local audits auto-detect .oss-signal.json.
    required: false
  baseline:
    description: Path to a previous oss-signal JSON report to compare with this audit.
    required: false
  fail-on-regression:
    description: Fail when a check that passed in the baseline now fails. Requires baseline.
    required: false
    default: "false"
outputs:
  tool:
    description: Tool identifier. Always oss-signal.
  version:
    description: oss-signal version that generated the report.
  mode:
    description: Execution mode. One of single, inventory, or trend.
  score:
    description: Numeric maintainer-readiness score, average score in inventory mode, or latest score in trend mode.
  grade:
    description: Letter grade for the maintainer-readiness score, average grade in inventory mode, or latest grade in trend mode.
  passed:
    description: Number of passed checks, total passed checks in inventory mode, or latest passed checks in trend mode.
  failed:
    description: Number of failed checks, total failed checks in inventory mode, or latest failed checks in trend mode.
  not-applicable:
    description: Number of checks marked not applicable, the inventory total, or the latest trend value.
  total:
    description: Total checks, the inventory total, or the latest trend value.
  earned-weight:
    description: Weighted points earned, the inventory total, or the latest trend value when available.
  available-weight:
    description: Weighted points available after exclusions, the inventory total, or the latest trend value when available.
  total-weight:
    description: Weighted points before exclusions, the inventory total, or the latest trend value when available.
  not-applicable-weight:
    description: Weighted points excluded as not applicable, the inventory total, or the latest trend value when available.
  baseline-enabled:
    description: Whether a single-repository report was compared with a baseline.
  regressions:
    description: Number of checks that passed in the baseline and fail in the current report, or total trend regressions.
  improvements:
    description: Number of checks that failed in the baseline and pass in the current report, or total trend improvements.
  new-checks:
    description: Number of current checks that were absent from the baseline report.
  removed-checks:
    description: Number of baseline checks that are absent from the current report.
  score-delta:
    description: Current score minus baseline score, or latest trend score minus first trend score.
  report-path:
    description: Path to the generated report file, when output is enabled.
runs:
  using: node24
  main: src/action.js
