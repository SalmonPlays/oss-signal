name: oss-signal
description: Audit OSS maintainer readiness, guard known-good baselines, and produce CI evidence, SARIF, inventory reports, workflow trials, and adoption packs.
author: SalmonPlays
branding:
  icon: shield
  color: blue
inputs:
  path:
    description: Local repository path, GitHub URL, or owner/repo shorthand to audit.
    required: false
    default: "."
  inventory:
    description: Newline-delimited file of local paths, GitHub URLs, or owner/repo shorthands to audit as an inventory.
    required: false
  format:
    description: Output format, either markdown, summary, json, env, sarif, issue, plan, workflow, or adoption. Inventory mode supports markdown, json, or env.
    required: false
    default: markdown
  output:
    description: Report file path.
    required: false
    default: oss-signal-report.md
  summary:
    description: Write a concise report to the GitHub Actions step summary.
    required: false
    default: "true"
  fail-under:
    description: Fail the action when the score, or any inventory target score, is below this 0-100 number.
    required: false
  max-files:
    description: Positive integer maximum files to inspect.
    required: false
    default: "20000"
  ref:
    description: Git ref for GitHub URL audits.
    required: false
  config:
    description: Path to an oss-signal JSON config file. Local audits auto-detect .oss-signal.json.
    required: false
  baseline:
    description: Path to a previous oss-signal JSON report to compare with this audit.
    required: false
  fail-on-regression:
    description: Fail when a check that passed in the baseline now fails. Requires baseline.
    required: false
    default: "false"
outputs:
  score:
    description: Numeric maintainer-readiness score, or average score in inventory mode.
  grade:
    description: Letter grade for the maintainer-readiness score, or average grade in inventory mode.
  passed:
    description: Number of passed checks, or total passed checks in inventory mode.
  failed:
    description: Number of failed checks, or total failed checks in inventory mode.
  not-applicable:
    description: Number of checks marked not applicable, or the total across inventory targets.
  total:
    description: Total number of checks, or the total across inventory targets.
  earned-weight:
    description: Weighted points earned, or the total earned across inventory targets.
  available-weight:
    description: Weighted points available after exclusions, or the total available across inventory targets.
  total-weight:
    description: Weighted points before exclusions, or the total across inventory targets.
  not-applicable-weight:
    description: Weighted points excluded as not applicable, or the total excluded across inventory targets.
  regressions:
    description: Number of checks that passed in the baseline and fail in the current report.
  score-delta:
    description: Current score minus baseline score when baseline comparison is enabled.
  report-path:
    description: Path to the generated report file, when output is enabled.
runs:
  using: node24
  main: src/action.js
