name: Adoption report
description: Share a public workflow run or maintainer use case for oss-signal.
title: "[Adoption] "
labels:
  - documentation
  - help wanted
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you tried oss-signal in a repository, CI workflow, audit issue, or maintainer cleanup process.
        Public workflow links are the most useful evidence.
        First-time maintainers can use the no-fail trial workflow: https://github.com/SalmonPlays/oss-signal/blob/main/docs/independent-workflow-run-request.md
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Link the repository where oss-signal was used.
      placeholder: "https://github.com/owner/repo"
    validations:
      required: true
  - type: input
    id: workflow
    attributes:
      label: Workflow run, PR, issue, or report link
      description: Link the public evidence. A workflow run in a maintainer-owned repository is the strongest signal.
      placeholder: "https://github.com/owner/repo/actions/runs/..."
    validations:
      required: false
  - type: dropdown
    id: mode
    attributes:
      label: How was oss-signal used?
      options:
        - No-fail GitHub Action trial
        - GitHub Action
        - CLI local audit
        - GitHub URL audit
        - Repository inventory
        - SARIF / Code Scanning
        - Issue-ready report
        - Maintainer acknowledgement
        - Other
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What did the tool help you decide, fix, or document?
      placeholder: "Example: added a security policy and PR template before a release."
    validations:
      required: true
  - type: checkboxes
    id: evidence_boundary
    attributes:
      label: Evidence boundary
      options:
        - label: I am a maintainer or contributor for the linked repository, or I have permission to share this public run.
          required: true
        - label: The linked repository is not owned by SalmonPlays if this should count as independent maintainer evidence.
          required: false
        - label: This report is not asking for stars, follows, reciprocal work, or promotion.
          required: true
  - type: checkboxes
    id: consent
    attributes:
      label: Public evidence
      options:
        - label: This can be referenced as public adoption evidence if the linked repository or workflow is public.
          required: false
