name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        id: oss-signal
        with:
          fail-under: "100"
          output: oss-signal-action-report.md
      - run: test "${{ steps.oss-signal.outputs.score }}" = "100"
      - uses: actions/upload-artifact@v7
        with:
          name: oss-signal-action-report
          path: oss-signal-action-report.md
