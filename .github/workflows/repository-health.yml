name: Repository health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  oss-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: SalmonPlays/oss-signal@3e086d4b2cb938a9aa67b12585a80f28632d9e91 # v0.9.9
        id: oss-signal
        with:
          fail-under: "90"
          output: oss-signal-report.md
          summary: "true"
      - run: test "${{ steps.oss-signal.outputs.score }}" -ge 90
      - uses: SalmonPlays/oss-signal@3e086d4b2cb938a9aa67b12585a80f28632d9e91 # v0.9.9
        with:
          format: sarif
          output: oss-signal.sarif
          summary: "false"
      - uses: SalmonPlays/oss-signal@3e086d4b2cb938a9aa67b12585a80f28632d9e91 # v0.9.9
        with:
          format: adoption
          output: oss-signal-adoption-pack.md
          summary: "false"
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: github.event_name != 'pull_request'
        with:
          sarif_file: oss-signal.sarif
      - name: Write artifact checksum manifest
        run: |
          sha256sum \
            oss-signal-report.md \
            oss-signal-adoption-pack.md \
            oss-signal.sarif > oss-signal-artifact-sha256.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-signal-report
          path: |
            oss-signal-report.md
            oss-signal-adoption-pack.md
            oss-signal.sarif
            oss-signal-artifact-sha256.txt
