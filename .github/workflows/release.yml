name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check tagged commit is on main
        run: |
          git fetch origin +main:refs/remotes/origin/main --no-tags
          tagged_commit="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$tagged_commit" origin/main; then
            echo "::error::Tagged commit $tagged_commit is not on origin/main. Push main before the release tag."
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.16.0
      - run: npm ci
      - run: npm run check
      - name: Check tag matches package version
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (pkg.version !== tag) { throw new Error(`tag ${tag} does not match package ${pkg.version}`); }"
      - name: Verify npm package contents
        run: npm publish --dry-run
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "oss-signal $GITHUB_REF_NAME" --notes-file "docs/release-notes/${GITHUB_REF_NAME}.md" --verify-tag
      - name: Publish to npm with trusted publishing
        run: npm publish --access public
