name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Check tag matches package version
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (pkg.version !== tag) { throw new Error(`tag ${tag} does not match package ${pkg.version}`); }"
      - name: Verify npm package contents
        run: npm publish --dry-run
      - name: Publish to npm with provenance
        if: env.NODE_AUTH_TOKEN != '' && vars.NPM_PUBLISH_ENABLED == 'true'
        run: npm publish --access public --provenance
      - name: Skip npm publish when automatic publishing is disabled
        if: env.NODE_AUTH_TOKEN == '' || vars.NPM_PUBLISH_ENABLED != 'true'
        run: echo "::notice::npm publish was skipped after dry-run verification. Set repository variable NPM_PUBLISH_ENABLED=true and configure an npm automation token to publish from this workflow."
