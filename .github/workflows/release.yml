name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.16.0
      - run: npm ci
      - run: npm run check
      - name: Check tag matches package version
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (pkg.version !== tag) { throw new Error(`tag ${tag} does not match package ${pkg.version}`); }"
      - name: Verify npm package contents
        run: npm publish --dry-run
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "oss-signal $GITHUB_REF_NAME" --notes-file "docs/release-notes/${GITHUB_REF_NAME}.md" --verify-tag
      - name: Publish to npm with trusted publishing
        run: npm publish --access public
