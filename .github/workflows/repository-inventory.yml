name: Repository inventory

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: SalmonPlays/oss-signal@v0.9.7
        id: oss-signal
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          inventory: docs/examples/inventory-targets.txt
          output: inventory-report.md
          summary: "true"
      - run: test "${{ steps.oss-signal.outputs.score }}" -ge 70
      - uses: actions/upload-artifact@v7
        with:
          name: oss-signal-inventory-report
          path: inventory-report.md
