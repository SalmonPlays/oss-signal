name: Repository inventory

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: SalmonPlays/oss-signal@1bb4418e14be225b5f5b628986ea464241caf7f1 # v0.10.0
        id: oss-signal
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          inventory: docs/examples/inventory-targets.txt
          output: inventory-report.md
          summary: "true"
      - run: test "${{ steps.oss-signal.outputs.score }}" -ge 70
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-signal-inventory-report
          path: inventory-report.md
