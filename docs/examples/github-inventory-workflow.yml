name: Repository inventory

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: SalmonPlays/oss-signal@3e086d4b2cb938a9aa67b12585a80f28632d9e91 # v0.9.9
        id: oss-signal
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          inventory: docs/examples/inventory-targets.txt
          output: inventory-report.md
          summary: "true"
      - name: Write artifact checksum manifest
        run: sha256sum inventory-report.md > inventory-artifact-sha256.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-signal-inventory-report
          retention-days: 14
          path: |
            inventory-report.md
            inventory-artifact-sha256.txt
