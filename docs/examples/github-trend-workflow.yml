name: oss-signal trend

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: SalmonPlays/oss-signal@5f98a7c560b90dbd1ba87dd0222bae331e0993c9 # trend feature snapshot
        id: oss-signal
        with:
          trend: docs/examples/trend-reports.txt
          format: markdown
          output: oss-signal-trend.md
          summary: "true"
      - name: Write artifact checksum manifest
        run: sha256sum oss-signal-trend.md > oss-signal-trend-sha256.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-signal-trend
          retention-days: 14
          path: |
            oss-signal-trend.md
            oss-signal-trend-sha256.txt
